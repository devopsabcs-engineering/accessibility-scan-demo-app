name: Build and Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  RESOURCE_GROUP: rg-a11y-scan-demo
  APP_NAME: a11y-scan-demo
  LOCATION: canadacentral

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: az group create --name ${{ env.RESOURCE_GROUP }} --location ${{ env.LOCATION }}

      - name: Deploy infrastructure
        uses: azure/arm-deploy@v2
        id: infra
        with:
          resourceGroupName: ${{ env.RESOURCE_GROUP }}
          template: ./infra/main.bicep
          parameters: appName=${{ env.APP_NAME }} imageTag=${{ github.sha }}

      - name: Log in to ACR
        run: |
          ACR_NAME=${{ steps.infra.outputs.acrName }}
          az acr login --name $ACR_NAME

      - name: Build and push Docker image
        run: |
          ACR_LOGIN_SERVER=${{ steps.infra.outputs.acrLoginServer }}
          IMAGE=$ACR_LOGIN_SERVER/${{ env.APP_NAME }}
          docker build -t $IMAGE:${{ github.sha }} -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Restart Web App
        run: |
          az webapp restart --name ${{ steps.infra.outputs.webAppName }} --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Add deployment link to summary
        run: |
          echo "## 🚀 Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Site:** [${{ steps.infra.outputs.webAppUrl }}](${{ steps.infra.outputs.webAppUrl }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Update SCANNER_URL secret on all demo app repos
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_PAT }}
        run: |
          SITE_URL="${{ steps.infra.outputs.webAppUrl }}"
          for i in 001 002 003 004 005; do
            REPO="devopsabcs-engineering/a11y-demo-app-${i}"
            echo "Setting SCANNER_URL on ${REPO}..."
            gh secret set SCANNER_URL --repo "$REPO" --body "$SITE_URL"
          done
          echo "SCANNER_URL updated on all demo app repos: $SITE_URL"
