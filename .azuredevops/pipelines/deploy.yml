trigger:
  branches:
    include: [main]

pool:
  vmImage: 'ubuntu-latest'

variables:
  resourceGroup: 'rg-a11y-scan-demo'
  appName: 'a11y-scan-demo'
  location: 'canadacentral'
  serviceConnection: 'a11y-scanner-ado'

steps:
  - checkout: self

  - task: AzureCLI@2
    displayName: 'Ensure resource group exists'
    inputs:
      azureSubscription: $(serviceConnection)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: az group create --name $(resourceGroup) --location $(location)

  - task: AzureCLI@2
    displayName: 'Deploy infrastructure'
    name: infra
    inputs:
      azureSubscription: $(serviceConnection)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        OUTPUTS=$(az deployment group create \
          --resource-group $(resourceGroup) \
          --template-file infra/main.bicep \
          --parameters appName=$(appName) imageTag=$(Build.SourceVersion) \
          --query 'properties.outputs' -o json)
        echo "##vso[task.setvariable variable=acrName;isOutput=true]$(echo $OUTPUTS | jq -r '.acrName.value')"
        echo "##vso[task.setvariable variable=acrLoginServer;isOutput=true]$(echo $OUTPUTS | jq -r '.acrLoginServer.value')"
        echo "##vso[task.setvariable variable=webAppName;isOutput=true]$(echo $OUTPUTS | jq -r '.webAppName.value')"
        echo "##vso[task.setvariable variable=webAppUrl;isOutput=true]$(echo $OUTPUTS | jq -r '.webAppUrl.value')"

  - task: AzureCLI@2
    displayName: 'Build and push Docker image'
    inputs:
      azureSubscription: $(serviceConnection)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        az acr login --name $(infra.acrName)
        IMAGE=$(infra.acrLoginServer)/$(appName)
        docker build -t $IMAGE:$(Build.SourceVersion) -t $IMAGE:latest .
        docker push $IMAGE:$(Build.SourceVersion)
        docker push $IMAGE:latest

  - task: AzureCLI@2
    displayName: 'Restart Web App'
    inputs:
      azureSubscription: $(serviceConnection)
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        az webapp restart --name $(infra.webAppName) --resource-group $(resourceGroup)
