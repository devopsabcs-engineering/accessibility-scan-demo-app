trigger: none
pr: none

schedules:
  - cron: '0 6 * * 1'
    displayName: 'Weekly Monday 06:00 UTC scan'
    branches:
      include:
        - main
    always: true

pool:
  vmImage: 'ubuntu-latest'

variables:
  - group: a11y-scan-config
  - name: scanUrl
    value: '$(APP_URL)'

steps:
  - checkout: self
    displayName: 'Checkout repository'

  - script: |
      mkdir -p results
      HTTP_STATUS=$(curl -s -o results/scan.sarif -w "%{http_code}" \
        -X POST "$(SCANNER_URL)/api/ci/scan" \
        -H "Content-Type: application/json" \
        -d '{"url": "$(scanUrl)", "format": "sarif"}' \
        --max-time 120)

      echo "HTTP status: $HTTP_STATUS"

      if [ "$HTTP_STATUS" -ne 200 ]; then
        echo "##vso[task.logissue type=error]Scan failed (HTTP $HTTP_STATUS)"
        exit 1
      fi

      echo "SARIF file written: results/scan.sarif"
      echo "File size: $(wc -c < results/scan.sarif) bytes"
    displayName: 'Run accessibility scan'
    timeoutInMinutes: 5

  - task: PublishPipelineArtifact@1
    condition: always()
    inputs:
      targetPath: 'results/scan.sarif'
      artifactName: 'sarif-a11y-demo-app-002'
    displayName: 'Publish SARIF artifact'

  - task: AdvancedSecurity-Publish@1
    condition: always()
    inputs:
      SarifsInputDirectory: '$(Build.SourcesDirectory)/results'
    displayName: 'Publish SARIF to Advanced Security'
